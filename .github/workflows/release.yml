name: Release

# Builds the macOS (Apple Silicon) app on a cloud runner.
# Triggers on a version tag (e.g. `v1.0.0`) or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed for the optional GitHub Release step

jobs:
  build:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Imports the Developer ID certificate into a temporary keychain.
      # Skips (builds ad-hoc signed) when the secret is absent.
      - name: Import Apple signing certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "$MAC_CERT_P12" ]; then
            echo "No MAC_CERT_P12 secret set — building ad-hoc signed."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$MAC_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      - name: Build distributable
        env:
          # Setting these enables osxSign + osxNotarize in forge.config.ts.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: |
          if [ -n "$APPLE_API_KEY_B64" ]; then
            echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/api_key.p8"
            export APPLE_API_KEY_PATH="$RUNNER_TEMP/api_key.p8"
          fi
          npm run make -- --arch=arm64

      - uses: actions/upload-artifact@v4
        with:
          name: memomi-macos-arm64
          path: out/make/**/*
          if-no-files-found: error

  # Optional: attach the artifact to a GitHub Release when a tag is pushed.
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
